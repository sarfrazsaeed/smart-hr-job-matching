<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartHire | Match Candidates</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="index.html">
      <i class="bi bi-people-fill text-primary me-2"></i>SmartHire
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-person-plus me-1"></i>Candidate</a></li>
<li class="nav-item"><a class="nav-link" href="hr.html"><i class="bi bi-briefcase me-1"></i>HR Portal</a></li>
<li class="nav-item"><a class="nav-link active" href="match.html"><i class="bi bi-diagram-3 me-1"></i>Match</a></li>
<li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-bar-chart me-1"></i>Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="about.html"><i class="bi bi-info-circle me-1"></i>About</a></li>

<li class="nav-item ms-2 d-flex align-items-center">
  <div class="form-check form-switch mb-0">
    <input class="form-check-input" type="checkbox" id="darkToggle" role="switch">
    <label class="form-check-label text-white" for="darkToggle">Dark</label>
  </div>
</li>
      </ul>
    </div>
  </div>
</nav>

<div class="hero-section text-center text-white py-5">
  <div class="container">
    <h1 class="display-5 fw-bold"><i class="bi bi-diagram-3-fill me-2"></i>Job–Candidate Matching</h1>
    <p class="lead opacity-75">Select a job and instantly find the best-matched candidates with skill scores</p>
  </div>
</div>

<div class="container py-5">

  <!-- Job Selector Card -->
  <div class="card shadow border-0 mb-4">
    <div class="card-body p-4">
      <div class="row align-items-end g-3">
        <div class="col-md-8">
          <label class="form-label fw-semibold fs-6"><i class="bi bi-briefcase me-2 text-primary"></i>Select Job to Match Against</label>
          <select id="jobSelector" class="form-select form-select-lg">
            <option value="">-- Select a posted job --</option>
          </select>
        </div>
        <div class="col-md-4">
          <button class="btn btn-primary btn-lg w-100" onclick="matchCandidates()">
            <i class="bi bi-search me-2"></i>Find Matches
          </button>
        </div>
      </div>
    </div>
  </div>



  <!-- Results -->
  <div id="printBtn" class="text-end mb-3" style="display:none">
    <button class="btn btn-outline-secondary" onclick="window.print()">
      <i class="bi bi-printer me-2"></i>Print Match Report
    </button>
  </div>
  <div id="match-summary-root"></div>
  <div id="result"></div>
</div>
  

<footer class="bg-dark text-white text-center py-3 mt-auto">
   <small class="opacity-50">© 2026 SmartHire — HTML · CSS · JavaScript · React · Bootstrap · Chart.js</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="MatchSummary.js"></script>
</body>
</html>
