<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styling -->
    <style>
        body {
            background-color: #9989b3;
            font-family: Arial, sans-serif;
        }

        /* Navigation button styling */
        .nav-btn {
            font-size: 18px;
            padding: 12px 24px;
            margin: 6px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Candidate Registration</h2>

    <!-- Navigation Buttons -->
    <div class="text-center mb-4">
        <a href="index.html" class="btn btn-primary nav-btn">Candidate</a>
        <a href="hr.html" class="btn btn-success nav-btn">HR</a>
        <a href="match.html" class="btn btn-dark nav-btn">Match</a>
        <a href="about.html" class="btn btn-info nav-btn">About</a>
        <a href="help.html" class="btn btn-secondary nav-btn">Help</a>
    </div>

    <!-- Candidate Form -->
    <form id="candidateForm">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="Enter full name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Enter email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Skills (comma separated)</label>
            <input type="text" class="form-control" id="skills" placeholder="e.g. C++, HTML, CSS" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Education</label>
            <input type="text" class="form-control" id="education" placeholder="e.g. BSCS" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Experience (years)</label>
            <input type="number" class="form-control" id="experience" min="0" placeholder="e.g. 1" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">
            Register
        </button>
    </form>

    <div id="message" class="mt-3"></div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
