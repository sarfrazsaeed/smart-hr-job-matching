<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Job Posting</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styling -->
    <style>
        body {
            background-color: #b2a0c2;
            font-family: Arial, sans-serif;
        }

        /* Navigation button styling */
        .nav-btn {
            font-size: 18px;
            padding: 12px 24px;
            margin: 6px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">HR - Job Posting Portal</h2>

    <!-- Navigation Buttons -->
    <div class="text-center mb-4">
        <a href="index.html" class="btn btn-primary nav-btn">Candidate</a>
        <a href="hr.html" class="btn btn-success nav-btn">HR</a>
        <a href="match.html" class="btn btn-dark nav-btn">Match</a>
        <a href="about.html" class="btn btn-info nav-btn">About</a>
        <a href="help.html" class="btn btn-secondary nav-btn">Help</a>
    </div>

    <!-- Job Posting Form -->
    <div class="card p-4 shadow">
        <form id="jobForm">

            <div class="mb-3">
                <label class="form-label">Job Title</label>
                <input type="text" id="jobTitle" class="form-control" placeholder="e.g. Web Developer" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Required Skills (comma separated)</label>
                <input type="text" id="jobSkills" class="form-control" placeholder="HTML, CSS, JavaScript" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Experience Required (Years)</label>
                <input type="number" id="jobExperience" class="form-control" min="0" placeholder="e.g. 1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Job Type</label>
                <select id="jobType" class="form-select" required>
                    <option value="">Select</option>
                    <option>Full Time</option>
                    <option>Part Time</option>
                    <option>Internship</option>
                    <option>Remote</option>
                </select>
            </div>

            <button class="btn btn-success btn-lg" type="submit">
                Post Job
            </button>
        </form>
    </div>

    <!-- Display Jobs -->
    <div class="mt-4">
        <h3>All Posted Jobs</h3>
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Job Title</th>
                    <th>Skills</th>
                    <th>Experience</th>
                    <th>Job Type</th>
                </tr>
            </thead>
            <tbody id="jobTable"></tbody>
        </table>
    </div>

    <div id="jobMessage"></div>

    <!-- View Candidates -->
    <button class="btn btn-primary btn-lg mt-3" onclick="showCandidates()">
        View All Registered Candidates
    </button>

    <!-- Candidates Area -->
    <div id="candidateList" class="mt-3"></div>

    <button class="btn btn-danger btn-lg mt-3" onclick="clearAllCandidates()">
        Clear All Candidates
    </button>

</div>

<!-- JS -->
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
